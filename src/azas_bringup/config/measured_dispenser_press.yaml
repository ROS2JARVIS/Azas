# Measured dispenser press poses from real robot teaching.
#
# IMPORTANT:
# - Values are Doosan GetCurrentPosx TCP poses in mm/deg at the pump top pose.
# - Teach by placing the active TCP at the dispenser pump top and using
#   tools/run/teach_dispenser_press_pose.py. Do not edit from guessed values.
# - Slot IDs are physical dispenser positions. Color bottles may be remapped at
#   runtime via DISPENSER_COLOR_MAP / panel color-map input.

metadata:
  source: operator_teaching_get_current_posx
  measured_target_frame: active_tcp
  units: mm_deg
  status: measured_draft
  physical_slot_count: 4
  legacy_slot_target_names:
    "1": red
    "2": green
    "3": yellow
    "4": blue

press_poses:
