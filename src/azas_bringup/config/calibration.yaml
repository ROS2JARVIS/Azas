# PDF/wiki-derived MVP-1 calibration placeholders.
# Real robot calibration is represented only by the top-level fields below.
# Null/확인 필요 values are intentional fail-closed markers; replace them only
# with measured robot-cell, hand-eye, MoveIt, or tool/TCP evidence.
frames:
  base_frame: base_link
  camera_frame: null        # 확인 필요: 실제 depth camera frame_id
  ee_link: link_6           # M0609 EE link (yolo_cup_pick_node.py 확인)
  planning_group: null      # 확인 필요: M0609 MoveIt GROUP_NAME
  gripper_tcp: gripper_tcp  # 확인 필요: 실제 TCP frame 구성 후 확정
  cup_mouth_center: cup_mouth_center
hand_eye:
  parent_frame: base_link
  child_frame: null         # 확인 필요: camera_frame
  npy_path: src/dsr_practice/config/T_gripper2camera.npy  # measured (May 15), used by yolo_cup_pick_node
  npy_path_alt: src/azas_perception/config/T_gripper2camera.npy  # re-calibrated (May 20)
  xyz_m: null               # 확인 필요: fill from npy after deciding canonical file
  rpy_rad: null             # 확인 필요: fill from npy after deciding canonical file

# Saved robot pose for dispenser color scanning.
# 직접 측정한 디스펜서 색상 스캔 포즈 (2026-06-05).
color_scan_pose:
  source: operator_measured
  ee_link: link_6
  joints_deg: [0.0, 10.0, 32.0, 0.0, 100.0, 90.0]
  joints_rad: [0.0, 0.1745, 0.5585, 0.0, 1.7453, 1.5708]
  joint_order: [joint_1, joint_2, joint_3, joint_4, joint_5, joint_6]
  cartesian_xyz_m: null
  cartesian_frame: base_link
cup_offsets:
  default:
    tcp_to_cup_mouth_m: null  # 확인 필요: jig/dry-run으로 측정
    status: 확인 필요
outlet:
  outlet_id: dispenser_outlet
  parent_frame: base_link
  pose_xyz_m: null          # 확인 필요: teaching/calibration으로 측정
  pose_rpy_rad: null        # 확인 필요
  clearance_m: null         # 확인 필요: rim/outlet 안전 간격

table:
  parent_frame: base_link
  source: operator_confirmed_base_link_bounds
  status: measured_confirmed
  surface_z_m: 0.000
  thickness_m: 0.040
  center_xy_m: [0.450, 0.000]
  size_xy_m: [1.200, 1.000]
  bounds_xy_m:
    x_min: -0.150
    x_max: 1.050
    y_min: -0.500
