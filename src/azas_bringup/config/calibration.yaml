# PDF/wiki-derived MVP-1 calibration placeholders.
# Real robot calibration is represented only by the top-level fields below.
# Null/확인 필요 values are intentional fail-closed markers; replace them only
# with measured robot-cell, hand-eye, MoveIt, or tool/TCP evidence.
frames:
  base_frame: base_link
  camera_frame: null        # 확인 필요: 실제 depth camera frame_id
  ee_link: null             # 확인 필요: M0609 MoveIt EE_LINK
  planning_group: null      # 확인 필요: M0609 MoveIt GROUP_NAME
  gripper_tcp: gripper_tcp  # 확인 필요: 실제 TCP frame 구성 후 확정
  cup_mouth_center: cup_mouth_center
hand_eye:
  parent_frame: base_link
  child_frame: null         # 확인 필요: camera_frame
  xyz_m: null               # 확인 필요: calibrated transform
  rpy_rad: null             # 확인 필요: calibrated transform
cup_offsets:
  default:
    tcp_to_cup_mouth_m: null  # 확인 필요: jig/dry-run으로 측정
    status: 확인 필요
outlet:
  outlet_id: dispenser_outlet
  parent_frame: base_link
  pose_xyz_m: null          # 확인 필요: teaching/calibration으로 측정
  pose_rpy_rad: null        # 확인 필요
  clearance_m: null         # 확인 필요: rim/outlet 안전 간격

table:
  parent_frame: base_link
  source: operator_confirmed_base_link_bounds
  status: measured_confirmed
  surface_z_m: 0.000
  thickness_m: 0.040
  center_xy_m: [0.450, 0.000]
  size_xy_m: [1.200, 1.000]
  bounds_xy_m:
    x_min: -0.150
    x_max: 1.050
    y_min: -0.500
    y_max: 0.500
  notes: "Derived from confirmed table size/center in base_link."

# Fixed dispenser-number to measured-pose mapping.
# STT/LLM may select only these IDs. Coordinates must be filled only from
# measured teaching/calibration data in base_link; never from STT, LLM, or VLA.
dispenser_outlets:
  "1":
    outlet_pose_xyz_m: null  # 확인 필요: base_link 기준 토출구 중심
    outlet_pose_rpy_rad: null
    press_pose_xyz_m: null   # 확인 필요: base_link 기준 누름/작동 위치
    press_pose_rpy_rad: null
    clearance_m: null
  "2":
    outlet_pose_xyz_m: null
    outlet_pose_rpy_rad: null
    press_pose_xyz_m: null
    press_pose_rpy_rad: null
    clearance_m: null
  "3":
    outlet_pose_xyz_m: null
    outlet_pose_rpy_rad: null
    press_pose_xyz_m: null
    press_pose_rpy_rad: null
    clearance_m: null
  "4":
    outlet_pose_xyz_m: null
    outlet_pose_rpy_rad: null
    press_pose_xyz_m: null
    press_pose_rpy_rad: null
    clearance_m: null

cup_holder:
  parent_frame: base_link
  # Measured with the active Doosan TCP placed in the holder hole.
  bottom_insert_center_pose_xyz_m: [0.429831, 0.220885, 0.017898]
  bottom_insert_center_pose_rpy_rad: [2.513735, -3.122200, 3.038293]
  top_center_estimated_xyz_m: [0.429831, 0.220885, 0.079500]
  radius_m: 0.045
  height_m: 0.062
  side_grip_place:
    pre_place_pose_xyz_m: [0.425545, 0.251832, 0.217371]
    pre_place_pose_rpy_rad: [1.600936, 1.622299, 2.132633]
    place_final_pose_xyz_m: [0.425545, 0.251832, 0.117371]
    place_final_pose_rpy_rad: [1.600936, 1.622299, 2.132633]
    retreat_pose_xyz_m: [0.415096, 0.189680, 0.113925]
