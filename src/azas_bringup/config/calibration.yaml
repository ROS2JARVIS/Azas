# Dry-run-only example values.
# These values document the shape of a temporary static TF for simulation or
# TF debugging. They are not calibration data and must not be copied into the
# real hand_eye/outlet fields or used on the real robot.
example_static_tf_do_not_use_on_real_robot:
  parent_frame: base_link
  child_frame: camera_color_optical_frame
  xyz_m: [0.35, 0.0, 0.65]
  rpy_rad: [0.0, 0.0, 0.0]
  example_command: "ros2 run tf2_ros static_transform_publisher --x 0.35 --y 0.0 --z 0.65 --roll 0.0 --pitch 0.0 --yaw 0.0 --frame-id base_link --child-frame-id camera_color_optical_frame"
