# Measured dispenser collision draft from real robot teaching.
#
# IMPORTANT:
# - These values were measured as base_link -> link_6 probe poses while the
#   gripper/link_6 assembly was placed against the dispenser. They are not
#   direct surface coordinates and must be reviewed with TCP/gripper offset
#   before enabling hard real-motion collision enforcement.
# - The boxes below are conservative primitive estimates for MoveIt Planning
#   Scene. Keep them disabled until verified in RViz against the real workcell.

metadata:
  frame_id: base_link
  measured_target_frame: link_6
  source: operator_teaching_tf2_echo
  status: draft_probe_estimate_not_enabled
  body_bottom_z_m: 0.000
  body_bottom_reason: dispenser bottles start on same floor plane as robot base
  margin_m:
    x: 0.020
    y: 0.020
    z: 0.020

front_hold_poses:
  # Cup hold/front limit poses. Cup pose itself still comes from vision.
  dispenser_1:
    position_xyz_m: [0.555, -0.100, 0.093]
    quaternion_xyzw: [0.214, 0.703, 0.667, 0.122]
    rpy_deg: [94.657, -6.597, 152.161]
  dispenser_2:
    position_xyz_m: [0.549, -0.150, 0.097]
    quaternion_xyzw: [0.239, 0.695, 0.660, 0.156]
    rpy_deg: [94.584, -5.669, 147.296]
  dispenser_3:
    position_xyz_m: [0.527, -0.204, 0.107]
    quaternion_xyzw: [0.274, 0.689, 0.642, 0.194]
    rpy_deg: [95.793, -4.872, 141.013]
