# Measured dispenser collision draft from real robot teaching.
#
# IMPORTANT:
# - front_hold_poses were measured as base_link -> link_6 teaching poses.
# - raw_probe_poses for the collision box were remeasured as
#   base_link -> gripper_tcp poses so the RG2 TCP offset is reflected.
# - The boxes below are conservative primitive estimates for MoveIt Planning
#   Scene. Keep them disabled until verified in RViz against the real workcell.

metadata:
  frame_id: base_link
  measured_target_frame: link_6
  collision_probe_target_frame: gripper_tcp
  source: operator_teaching_tf2_echo
  status: measured_draft_single_box_not_enabled
  body_bottom_z_m: 0.000
  body_bottom_reason: dispenser bottles start on same floor plane as robot base
  margin_m:
    x: 0.020
    y: 0.020
    z: 0.020

front_hold_poses:
  # Cup hold/front limit poses. Cup pose itself still comes from vision.
  dispenser_1:
    position_xyz_m: [0.609000, 0.070000, 0.087000]
    quaternion_xyzw: [0.489000, 0.517000, 0.517000, 0.475000]
    rpy_deg: [90.798, -0.845, 93.984]
  dispenser_2:
    position_xyz_m: [0.617000, 0.028000, 0.082000]
    quaternion_xyzw: [0.504000, 0.504000, 0.500000, 0.491000]
    rpy_deg: [90.946, -0.512, 90.501]
  dispenser_3:
    position_xyz_m: [0.616000, -0.026000, 0.079000]
    quaternion_xyzw: [0.504000, 0.504000, 0.498000, 0.494000]
    rpy_deg: [90.926, -0.278, 90.234]
  dispenser_4:
    position_xyz_m: [0.607000, -0.083000, 0.075000]
    quaternion_xyzw: [0.511000, 0.498000, 0.492000, 0.499000]
    rpy_deg: [91.042, -0.280, 88.871]

raw_probe_poses:
  left_front_bottom_probe:
    position_xyz_m: [0.850, 0.121, 0.031]
    quaternion_xyzw: [0.680, -0.594, 0.283, -0.323]
    rpy_deg: [-129.105, -0.054, -82.270]
  right_back_top_probe:
    position_xyz_m: [0.908, -0.145, 0.308]
    quaternion_xyzw: [-0.527, 0.637, -0.423, 0.370]
    rpy_deg: [-111.636, 1.516, -99.773]

estimated_collision_objects:
  dispenser_combined_body_box:
    type: box
    frame_id: base_link
    # Single measured draft box from left-front-bottom and right-back-top
    # gripper_tcp probe poses. X/Y are expanded by metadata.margin_m on each side;
    # Z uses body_bottom_z_m as the dispenser rests on the base/table plane.
    center_xyz_m: [0.8790, -0.0120, 0.1640]
    size_xyz_m: [0.0980, 0.3060, 0.3280]
    bounds_xyz_m:
      min: [0.8300, -0.1650, 0.0000]
      max: [0.9280, 0.1410, 0.3280]
    orientation_xyzw: [0.0, 0.0, 0.0, 1.0]
    publish_to_planning_scene: true
    enabled_for_real_motion: false
