estimated_collision_objects:
  dispenser_body_box:
    type: box
    frame_id: base_link
    # Legacy broad axis-aligned estimate. Kept visible as a faint comparison
    # marker only because it overlaps the taught front-hold points.
    center_xyz_m: [0.6815, -0.1300, 0.1310]
    size_xyz_m: [0.2990, 0.3100, 0.2620]
    bounds_xyz_m:
      min: [0.5320, -0.2850, 0.0000]
      max: [0.8310, 0.0250, 0.2620]
    orientation_xyzw: [0.0, 0.0, 0.0, 1.0]
    publish_to_planning_scene: false
    enabled_for_real_motion: false
  dispenser_1_body_box_v2:
    type: box
    frame_id: base_link
    # Local x axis follows the dispenser depth direction measured from the
