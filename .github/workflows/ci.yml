name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  colcon:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up ROS apt repository
        run: |
          sudo add-apt-repository universe
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
            http://packages.ros.org/ros2/ubuntu \
            $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | \
            sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null

      - name: Install package dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-colcon-common-extensions python3-colcon-ros python3-rosdep ros-humble-ament-cmake-python
          sudo rosdep init || true
          rosdep update
          rosdep install --from-paths src --ignore-src --rosdistro humble -y \
            --skip-keys "ament_python moveit_py dsr_description2 dsr_moveit_config_m0609 dsr_msgs2"

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test
          colcon test-result --verbose
